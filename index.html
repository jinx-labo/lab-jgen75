<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jgen75 – MINUTEUR</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #f0f0f0;
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    user-select: none;
  }

  h1 {
    font-size: clamp(2rem, 10vw, 4rem);
    letter-spacing: 0.3em;
    color: #ff6b35;
    text-shadow: 0 0 20px #ff6b3588;
    margin-bottom: 40px;
    font-weight: 900;
  }

  .display {
    font-size: clamp(5rem, 25vw, 12rem);
    font-weight: 900;
    letter-spacing: 0.05em;
    color: #ffffff;
    text-shadow: 0 0 30px #ffffff55, 0 0 60px #ff6b3533;
    margin-bottom: 50px;
    line-height: 1;
    transition: color 0.3s;
  }

  .display.running {
    color: #aaffaa;
    text-shadow: 0 0 30px #aaffaa88, 0 0 60px #00ff0033;
  }

  .display.urgent {
    color: #ff4444;
    text-shadow: 0 0 30px #ff444488, 0 0 60px #ff000055;
    animation: pulse 0.5s ease-in-out infinite alternate;
  }

  @keyframes pulse {
    from { opacity: 1; }
    to   { opacity: 0.6; }
  }

  .controls-time {
    display: flex;
    gap: 20px;
    margin-bottom: 40px;
  }

  .btn {
    border: none;
    border-radius: 16px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 800;
    transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.93); }

  .btn-adj {
    background: #1e1e1e;
    border: 2px solid #444;
    color: #f0f0f0;
    font-size: clamp(1.2rem, 5vw, 1.8rem);
    padding: 18px 28px;
    min-width: 120px;
    box-shadow: 0 4px 15px #00000066;
  }

  .btn-adj:hover {
    background: #2a2a2a;
    border-color: #ff6b35;
    color: #ff6b35;
    box-shadow: 0 4px 20px #ff6b3544;
  }

  .btn-adj span.label {
    display: block;
    font-size: 0.55em;
    letter-spacing: 0.1em;
    opacity: 0.7;
    margin-top: 4px;
  }

  .btn-main {
    font-size: clamp(1.4rem, 6vw, 2rem);
    padding: 22px 60px;
    letter-spacing: 0.15em;
    box-shadow: 0 6px 25px #00000088;
    min-width: 220px;
  }

  .btn-start {
    background: linear-gradient(135deg, #ff6b35, #e84545);
    color: #fff;
  }

  .btn-start:hover {
    background: linear-gradient(135deg, #ff8c5a, #ff5555);
    box-shadow: 0 8px 30px #ff6b3566;
  }

  .btn-pause {
    background: linear-gradient(135deg, #f0c040, #e07b00);
    color: #1a1a1a;
  }

  .btn-pause:hover {
    background: linear-gradient(135deg, #ffda60, #f09010);
    box-shadow: 0 8px 30px #f0c04066;
  }

  .btn-reset {
    background: #1e1e1e;
    border: 2px solid #555;
    color: #aaa;
    font-size: clamp(0.9rem, 3.5vw, 1.1rem);
    padding: 14px 36px;
    letter-spacing: 0.1em;
    margin-top: 20px;
  }

  .btn-reset:hover {
    background: #2a2a2a;
    border-color: #888;
    color: #f0f0f0;
  }

  .actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .finished-msg {
    font-size: clamp(1.2rem, 5vw, 1.8rem);
    color: #ff4444;
    letter-spacing: 0.2em;
    text-align: center;
    animation: blink 0.8s step-end infinite;
    margin-top: -20px;
    margin-bottom: 20px;
    min-height: 2.2rem;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
</style>
</head>
<body>

<h1>MINUTEUR</h1>

<div class="display" id="display">05:00</div>

<div class="finished-msg" id="finishedMsg"></div>

<div class="controls-time">
  <button class="btn btn-adj" id="btnMinus" onclick="adjustTime(-60)">
    −1
    <span class="label">MIN</span>
  </button>
  <button class="btn btn-adj" id="btnPlus" onclick="adjustTime(60)">
    +1
    <span class="label">MIN</span>
  </button>
</div>

<div class="actions">
  <button class="btn btn-main btn-start" id="btnStart" onclick="toggleStartPause()">DÉMARRER</button>
  <button class="btn btn-reset" onclick="resetTimer()">↺ RÉINITIALISER</button>
</div>

<script>
  var totalSeconds = 300;
  var remaining   = 300;
  var running     = false;
  var finished    = false;
  var interval    = null;
  var alarmTimer  = null;

  var display      = document.getElementById('display');
  var btnStart     = document.getElementById('btnStart');
  var finishedMsg  = document.getElementById('finishedMsg');

  function fmt(s) {
    s = Math.max(0, s);
    var m = Math.floor(s / 60);
    var sec = s % 60;
    return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function updateDisplay() {
    display.textContent = fmt(remaining);
    display.classList.remove('running', 'urgent');
    if (finished) {
      display.classList.add('urgent');
    } else if (running) {
      if (remaining <= 10) {
        display.classList.add('urgent');
      } else {
        display.classList.add('running');
      }
    }
  }

  function adjustTime(delta) {
    if (running) return;
    finished = false;
    finishedMsg.textContent = '';
    totalSeconds = Math.max(60, totalSeconds + delta);
    remaining    = totalSeconds;
    updateDisplay();
  }

  function toggleStartPause() {
    if (finished) {
      resetTimer();
      return;
    }
    if (!running) {
      if (remaining <= 0) remaining = totalSeconds;
      startTimer();
    } else {
      pauseTimer();
    }
  }

  function startTimer() {
    running = true;
    btnStart.textContent = 'PAUSE';
    btnStart.classList.remove('btn-start');
    btnStart.classList.add('btn-pause');
    updateDisplay();
    interval = setInterval(function() {
      remaining--;
      updateDisplay();
      if (remaining <= 0) {
        clearInterval(interval);
        interval = null;
        running  = false;
        finished = true;
        btnStart.textContent = 'RECOMMENCER';
        btnStart.classList.remove('btn-pause');
        btnStart.classList.add('btn-start');
        finishedMsg.textContent = '⏰ C\'EST PRÊT !';
        beepAlarm();
      }
    }, 1000);
  }

  function pauseTimer() {
    running = false;
    clearInterval(interval);
    interval = null;
    btnStart.textContent = 'REPRENDRE';
    btnStart.classList.remove('btn-pause');
    btnStart.classList.add('btn-start');
    updateDisplay();
  }

  function resetTimer() {
    running  = false;
    finished = false;
    clearInterval(interval);
    interval = null;
    remaining = totalSeconds;
    finishedMsg.textContent = '';
    btnStart.textContent = 'DÉMARRER';
    btnStart.classList.remove('btn-pause');
    btnStart.classList.add('btn-start');
    updateDisplay();
  }

  function beepAlarm() {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var count = 0;
      function beep() {
        if (count >= 6) { ctx.close(); return; }
        var osc  = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type      = 'sine';
        osc.frequency.value = (count % 2 === 0) ? 880 : 660;
        gain.gain.setValueAtTime(0.6, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.35);
        count++;
        setTimeout(beep, 450);
      }
      beep();
    } catch(e) {}
  }

  updateDisplay();
</script>
</body>
</html>
